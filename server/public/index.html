<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Story Scribe | Interactive Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-zinc-300 min-h-screen flex selection:bg-zinc-800 selection:text-white overflow-hidden">

    <!-- Library Sidebar -->
    <aside id="library-sidebar" class="fixed inset-y-0 left-0 w-72 bg-zinc-950 border-r border-zinc-900 z-50 flex flex-col">
        <div class="p-6 border-b border-zinc-900 flex justify-between items-center">
            <h2 class="text-xs uppercase tracking-[0.2em] text-zinc-500 font-semibold">Library</h2>
            <button onclick="app.toggleLibrary(event)" class="text-zinc-600 hover:text-zinc-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="p-4">
            <button onclick="app.createNewStory()" class="w-full text-[10px] uppercase tracking-widest border border-zinc-800 py-3 hover:bg-zinc-900 transition-colors">
                + New Adventure
            </button>
        </div>
        <div id="story-list" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2"></div>
    </aside>

    <!-- Main Content -->
    <div id="main-container" onclick="app.closeLibrary()" class="flex-1 flex flex-col min-w-0 h-screen relative">
        
        <!-- Header -->
        <header class="p-6 border-b border-zinc-900 flex justify-between items-center bg-zinc-950/50 backdrop-blur-md z-40">
            <div class="flex items-center gap-6">
                <button onclick="app.toggleLibrary(event)" class="text-zinc-500 hover:text-zinc-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="space-y-1">
                    <h1 id="current-story-title" class="text-lg font-light text-zinc-100 tracking-tight">Select a Story</h1>
                    <div class="flex items-center gap-4 text-[10px] uppercase tracking-[0.2em] text-zinc-600">
                        <span>Core:</span>
                        <select id="model-select" class="bg-transparent border-none p-0 focus:outline-none cursor-pointer pr-4"></select>
                        <span id="connection-status">• Offline</span>
                    </div>
                </div>
            </div>

            <nav class="flex gap-8 text-[10px] uppercase tracking-[0.2em] font-semibold">
                <button id="tab-interactive" onclick="app.switchTab('interactive')" class="pb-2 tab-active transition-all">Interactive</button>
                <button id="tab-novel" onclick="app.switchTab('novel')" class="pb-2 text-zinc-600 hover:text-zinc-400 transition-all">The Novel</button>
            </nav>
        </header>

        <!-- Viewports -->
        <main class="flex-1 overflow-hidden relative">
            
            <!-- Interactive View -->
            <section id="view-interactive" class="h-full flex flex-col p-6 sm:p-12">
                <div id="interactive-content" class="flex-1 overflow-y-auto custom-scrollbar space-y-8 max-w-2xl mx-auto w-full pb-12">
                    <div class="text-zinc-600 italic text-center pt-24">Select a story from the library or create a new one to begin.</div>
                </div>
                
                <footer class="max-w-2xl mx-auto w-full pt-6 space-y-4">
                    <div id="input-area" class="flex gap-4 opacity-50 pointer-events-none">
                        <input type="text" id="user-action" placeholder="What do you do?" 
                            class="bg-transparent border-b border-zinc-900 w-full py-2 focus:outline-none focus:border-zinc-500 transition-colors font-light text-zinc-100"
                            onkeypress="if(event.key === 'Enter') app.handleAction()">
                        <button onclick="app.handleAction()" class="text-[10px] border border-zinc-800 px-6 py-2 hover:bg-zinc-900 hover:text-zinc-100 transition-all duration-300 tracking-wider uppercase whitespace-nowrap">
                            Proceed
                        </button>
                    </div>
                    <p id="status-msg" class="text-[10px] uppercase tracking-widest text-zinc-700 h-4 text-center"></p>
                </footer>
            </section>

            <!-- Novel View -->
            <section id="view-novel" class="h-full hidden flex flex-col bg-zinc-950">
                <div class="flex justify-center p-4 border-b border-zinc-900/50 gap-2">
                    <button id="btn-1st-person" onclick="app.switchNovelPerspective('1st')" class="text-[9px] uppercase tracking-widest px-4 py-1.5 rounded border border-transparent text-zinc-600 hover:text-zinc-400 transition-all">1st Person</button>
                    <button id="btn-3rd-person" onclick="app.switchNovelPerspective('3rd')" class="text-[9px] uppercase tracking-widest px-4 py-1.5 rounded border border-transparent perspective-active transition-all">3rd Person</button>
                </div>
                <div id="novel-content" class="flex-1 overflow-y-auto custom-scrollbar p-6 sm:p-12">
                    <div id="novel-body" class="max-w-2xl mx-auto w-full prose prose-invert prose-zinc font-light leading-relaxed text-lg pb-24"></div>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
