<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Story Scribe | Interactive Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 selection:bg-zinc-800 selection:text-white">

    <div id="story-container" class="max-w-2xl w-full space-y-8">
        <header class="flex justify-between items-start mb-12">
            <div class="space-y-2 border-l-2 border-zinc-800 pl-6">
                <h1 class="text-xs uppercase tracking-[0.3em] text-zinc-500 font-semibold">Status: Online</h1>
                <h2 class="text-xl font-light text-zinc-100 tracking-tight">Session: New Adventure</h2>
            </div>
            <button id="save-btn" onclick="saveNovel()" class="text-[10px] uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors border border-zinc-900 px-3 py-1 rounded">
                Persist to Log
            </button>
        </header>

        <main id="narrative-container" class="space-y-6 text-lg leading-relaxed font-light min-h-[300px]">
            <!-- Narrative will be injected here -->
            <div class="fade-in text-zinc-500 italic">
                Type your first action to begin your story...
            </div>
        </main>

        <footer id="actions" class="pt-12 space-y-4">
            <div id="input-area" class="flex gap-4">
                <input type="text" id="user-action" placeholder="What do you do?" 
                    class="bg-transparent border-b border-zinc-800 w-full py-2 focus:outline-none focus:border-zinc-500 transition-colors font-light text-zinc-100"
                    onkeypress="if(event.key === 'Enter') handleAction()">
                <button onclick="handleAction()" class="text-xs border border-zinc-800 px-6 py-2 hover:bg-zinc-900 hover:text-zinc-100 transition-all duration-300 tracking-wider uppercase whitespace-nowrap">
                    Proceed
                </button>
            </div>
            <p id="status-msg" class="text-[10px] uppercase tracking-widest text-zinc-600 h-4"></p>
        </footer>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        const MODEL = 'llama3'; // Default model, update as needed
        let thirdPersonSession = "";
        let firstTurn = true;

        async function handleAction() {
            const input = document.getElementById('user-action');
            const action = input.value.trim();
            if (!action) return;

            if (firstTurn) {
                document.getElementById('narrative-container').innerHTML = '';
                firstTurn = false;
            }

            input.value = '';
            updateStatus('Thinking...');
            
            try {
                // 1. Generate 1st Person Narrative for UI
                const firstPersonPrompt = `You are an immersive storyteller. Respond to this action in the FIRST PERSON: "${action}". Continue the story based on this prompt. Keep it concise, atmospheric, and under 3 paragraphs.`;
                const fpResponse = await callGenerate(firstPersonPrompt);
                appendNarrative(fpResponse);

                // 2. Generate 3rd Person Novelization for persistence
                const thirdPersonPrompt = `Novelize the following event in a formal, third-person literary style: "${action}". Result: ${fpResponse}. Keep it atmospheric.`;
                const tpResponse = await callGenerate(thirdPersonPrompt);
                thirdPersonSession += `\n\n${tpResponse}`;

                updateStatus('');
            } catch (err) {
                console.error(err);
                updateStatus('ERROR: LINK FAILURE');
            }
        }

        async function callGenerate(prompt) {
            const res = await fetch(`${API_BASE}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: MODEL, prompt })
            });
            const data = await res.json();
            return data.response;
        }

        function appendNarrative(text) {
            const container = document.getElementById('narrative-container');
            const div = document.createElement('div');
            div.className = 'fade-in space-y-4 mt-8 pt-8 border-t border-zinc-900/50';
            
            const paragraphs = text.split('\n\n');
            paragraphs.forEach(p => {
                const el = document.createElement('p');
                el.textContent = p;
                div.appendChild(el);
            });
            
            container.appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function saveNovel() {
            if (!thirdPersonSession) {
                updateStatus('NO NEW LOGS');
                return;
            }
            
            updateStatus('PERSISTING...');
            try {
                await fetch(`${API_BASE}/save-novel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: thirdPersonSession })
                });
                thirdPersonSession = "";
                updateStatus('LOG SECURED');
                setTimeout(() => updateStatus(''), 2000);
            } catch (err) {
                updateStatus('PERSISTENCE FAILURE');
            }
        }

        function updateStatus(msg) {
            document.getElementById('status-msg').textContent = msg;
        }
    </script>
</body>
</html>
